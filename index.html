<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Prevent some libraries from trying to overwrite fetch
      (function() {
        var originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Attempt to overwrite fetch blocked'); },
              configurable: true
            });
          } catch (e) {
            console.warn('Could not redefine fetch:', e);
          }
        }
      })();
    </script>
    <title>Neon Snake Arena</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
